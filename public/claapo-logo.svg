<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" role="img" aria-label="Claapo">
  <!-- Brand tile + chevron mark -->
  <g>
    <rect x="4" y="4" width="48" height="48" rx="13" fill="#3B5BDB"/>
    <polyline points="16,24 28,15 40,24" fill="none" stroke="#FFFFFF" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="18,35 28,27 38,35" fill="none" stroke="#FFFFFF" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/>
  </g>
  <!-- Wordmark "Claapo" — uses system sans so it works without external fonts -->
  <text
    x="64"
    y="38"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
    font-size="30"
    font-weight="800"
    fill="#0F172A"
    letter-spacing="-1.2"
  >Claapo</text>
</svg>
